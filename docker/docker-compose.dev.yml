# ==========================================
# AI Trader v2 – Development Environment
# ==========================================
# Usage: docker compose -f docker/docker-compose.dev.yml up --build
# Features: hot-reload, debug, exposed ports, verbose logging
# ==========================================

services:

  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASS:-dev_password_only}
      POSTGRES_DB: ${DB_NAME:-trading_log}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-trading_log}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      - APP_ENV=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ../backend/app:/app/app:rw    # Hot-reload
      - ../backend/alembic:/app/alembic:rw
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ../frontend/src:/app/src:rw   # Hot-reload
      - nextcache_dev:/app/.next      # Persist Turbopack cache across restarts
    ports:
      - "3100:3100"
    command: ["npm", "run", "dev"]

  # ---- Celery Worker (Background Tasks) ----
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ../backend/app:/app/app:rw
      - ../backend/alembic:/app/alembic:rw
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=debug"]

volumes:
  pgdata_dev:
  nextcache_dev:
