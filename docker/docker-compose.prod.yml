# ==========================================
# AI Trader v2 – Production Environment
# ==========================================
# Usage: docker compose -f docker/docker-compose.prod.yml up --build -d
# Features: optimized, no debug, resource limits, no exposed DB ports
# ==========================================

services:

  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME:-trading_log}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # No exposed ports in prod — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-trading_log}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - DB_HOST=db
      - REDIS_HOST=redis
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4", "--no-access-log"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      - backend
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---- Celery Worker ----
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - REDIS_HOST=redis
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=warning", "--concurrency=4"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---- Nginx (Reverse Proxy + SSL) ----
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

volumes:
  pgdata_prod:
